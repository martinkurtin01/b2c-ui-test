<!DOCTYPE html>
<!--
  Custom self-asserted page for the password reset / email verification step.
  [GS-120] Skips the intermediate "Change e-mail / Continue" screen after the
  verification code is confirmed: hides the change-email button and auto-clicks
  Continue so the user goes straight to the password change screen.

  Requirements:
  - Must be hosted on a CORS-enabled HTTPS endpoint (storage + CDN).
  - The ContentDefinition for api.localaccountpasswordreset must point its
    LoadUri here and set ScriptExecution=Allow.
  - The <div id="api"></div> placeholder is mandatory; B2C injects its UI there.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password reset</title>
  </head>
  <body>
    <div id="api"></div>

    <script>
      (function () {
        'use strict';

        // Hides the "Change e-mail" button rendered by the email verification control.
        function hideChangeEmailButton() {
          var changeButtons = document.querySelectorAll(
            '#email_ver_but_edit, .changeClaims'
          );
          changeButtons.forEach(function (button) {
            button.style.display = 'none';
          });
        }

        // After the verification code is confirmed, B2C reveals the Continue
        // button. Auto-click it so the user is taken directly to the password
        // change step without an extra manual click.
        function autoClickContinue() {
          var continueButton = document.getElementById('continue');
          if (
            continueButton &&
            continueButton.offsetParent !== null &&
            !continueButton.disabled &&
            !continueButton.dataset.autoClicked
          ) {
            // The success message element is present only after the code is verified.
            var verifiedMessage = document.querySelector(
              '.verificationSuccessText, #email_success'
            );
            if (verifiedMessage && verifiedMessage.offsetParent !== null) {
              continueButton.dataset.autoClicked = 'true';
              continueButton.click();
            }
          }
        }

        var observer = new MutationObserver(function () {
          hideChangeEmailButton();
          autoClickContinue();
        });

        document.addEventListener('DOMContentLoaded', function () {
          hideChangeEmailButton();
          observer.observe(document.body, {
            attributes: true,
            childList: true,
            subtree: true,
          });
        });
      })();
    </script>
  </body>
</html>
