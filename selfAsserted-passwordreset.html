<!DOCTYPE html>
<!--
  Custom self-asserted page for the password reset / email verification step.
  [GS-120] Skips the intermediate "Change e-mail / Continue" screen after the
  verification code is confirmed: hides the change-email button and auto-clicks
  Continue so the user goes straight to the password change screen.

  Requirements:
  - Must be hosted on a CORS-enabled HTTPS endpoint (storage + CDN).
  - The ContentDefinition for api.localaccountpasswordreset must point its
    LoadUri here and set ScriptExecution=Allow.
  - The <div id="api"></div> placeholder is mandatory; B2C injects its UI there.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password reset</title>
    <!--
      [GS-120] Inline AzureBlue-equivalent styling. A fully custom LoadUri page
      only receives the B2C UI injected into <div id="api">; it does NOT inherit
      the AzureBlue CSS. We embed the styles here (no external CDN, avoids CORS)
      so the page keeps the standard look while the JS mutator skips the
      intermediate "Change e-mail / Continue" screen.
    -->
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", "Segoe WP", Tahoma, Arial, sans-serif;
        font-size: 14px;
        color: #333;
        background-color: #f2f2f2;
      }
      #api {
        max-width: 400px;
        margin: 0 auto;
        padding: 40px 24px;
        background-color: #ffffff;
        min-height: 100%;
        box-sizing: border-box;
      }
      @media (min-width: 480px) {
        #api {
          margin: 48px auto;
          min-height: 0;
          border: 1px solid #d6d6d6;
          box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }
      }
      #api .intro h2 {
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 16px;
      }
      #api .heading,
      #api .intro {
        margin-bottom: 16px;
      }
      #api .entry-item,
      #api .attrEntry {
        margin-bottom: 16px;
      }
      #api label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }
      #api input[type="text"],
      #api input[type="email"],
      #api input[type="password"],
      #api input.textInput {
        width: 100%;
        box-sizing: border-box;
        height: 36px;
        padding: 6px 10px;
        border: 1px solid #c8c8c8;
        border-radius: 0;
        font-size: 14px;
      }
      #api input[type="text"]:focus,
      #api input[type="email"]:focus,
      #api input[type="password"]:focus {
        border-color: #0067b8;
        outline: none;
      }
      #api button,
      #api .buttons button {
        min-width: 120px;
        height: 36px;
        padding: 6px 20px;
        margin-top: 8px;
        border: none;
        background-color: #0067b8;
        color: #ffffff;
        font-size: 14px;
        cursor: pointer;
      }
      #api button:hover {
        background-color: #005da6;
      }
      #api button#email_ver_but_edit,
      #api .secondary-button {
        background-color: #ffffff;
        color: #0067b8;
        border: 1px solid #0067b8;
      }
      #api .error,
      #api .verificationErrorText,
      #api .itemLevel .error {
        color: #e81123;
        font-size: 13px;
        margin-top: 6px;
      }
      #api .verificationInfoText,
      #api #email_success {
        color: #107c10;
        font-size: 13px;
        margin: 8px 0;
      }
    </style>
  </head>
  <body>
    <div id="api"></div>

    <script>
      (function () {
        'use strict';

        function isVisible(el) {
          return !!el && el.offsetParent !== null;
        }

        function isHidden(el) {
          if (!el) return true;
          if (el.getAttribute('aria-hidden') === 'true') return true;
          return window.getComputedStyle(el).display === 'none';
        }

        // The email is considered verified (locale-independent) when the
        // "Verify code" button is hidden AND the "Change e-mail" button is
        // visible. This only happens on the post-verification screen, not on
        // the email-entry or code-entry screens.
        function isEmailVerified() {
          var verifyButton = document.getElementById('email_ver_but_verify');
          var editButton = document.getElementById('email_ver_but_edit');
          return isHidden(verifyButton) && isVisible(editButton);
        }

        function autoSkipIntermediateScreen() {
          if (!isEmailVerified()) {
            return;
          }

          // Hide the "Change e-mail" button.
          var editButton = document.getElementById('email_ver_but_edit');
          if (editButton) {
            editButton.style.display = 'none';
          }

          // Auto-click Continue so the user goes straight to the password screen.
          var continueButton = document.getElementById('continue');
          if (
            isVisible(continueButton) &&
            !continueButton.dataset.autoClicked
          ) {
            continueButton.dataset.autoClicked = 'true';
            continueButton.click();
          }
        }

        var observer = new MutationObserver(autoSkipIntermediateScreen);

        document.addEventListener('DOMContentLoaded', function () {
          observer.observe(document.body, {
            attributes: true,
            childList: true,
            subtree: true,
          });
          autoSkipIntermediateScreen();
        });
      })();
    </script>
  </body>
</html>
